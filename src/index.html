<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <div id="app">
    <header id="appHeader">
      <div class="header-left">
        <h1 id="headerTitle">Todo App</h1>
        <span id="todoCount" class="todo-count">0</span>
      </div>
      <div class="header-actions" id="headerActions">
        <button id="multiSelectBtn" class="icon-btn" title="Multi-select">☑️</button>
        <button id="viewToggle" class="icon-btn" title="Toggle view">📅</button>
        <button id="pomodoroBtn" class="icon-btn" title="Pomodoro Timer">🍅</button>
        <button id="clearCompleted" class="icon-btn hidden" title="Clear completed">🗑️</button>
        <button id="manageTags" class="icon-btn" title="Tags">🏷️</button>
        <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
      </div>
    </header>

    <!-- Multi-select toolbar -->
    <div id="multiSelectBar" class="multi-select-bar hidden">
      <span id="selectedCount">0 selected</span>
      <button class="ms-btn" onclick="bulkComplete()">✅ Complete</button>
      <button class="ms-btn" onclick="bulkDelete()">🗑️ Delete</button>
      <button class="ms-btn" onclick="bulkClearSelection()">✕ Cancel</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search todos... (press / to focus)" />
      <button id="clearSearch" class="search-clear hidden">✕</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-chip active" data-filter="all">
        <span class="chip-label">All</span>
        <span id="countAll" class="chip-count">0</span>
      </button>
      <button class="filter-chip" data-filter="pending">
        <span class="chip-label">Pending</span>
        <span id="countPending" class="chip-count">0</span>
      </button>
      <button class="filter-chip" data-filter="done">
        <span class="chip-label">Done</span>
        <span id="countDone" class="chip-count">0</span>
      </button>
    </div>

    <!-- Todo List -->
    <div id="todoList" class="todo-list"></div>

    <!-- Calendar View -->
    <div id="calendarView" class="calendar-view hidden">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">◀</button>
        <span id="calTitle" class="cal-title"></span>
        <button class="cal-nav" onclick="calNext()">▶</button>
      </div>
      <div class="cal-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div id="calGrid" class="cal-grid"></div>
      <div id="calTodos" class="cal-todos"></div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📝</div>
      <h2 id="emptyTitle">No todos yet</h2>
      <p id="emptySubtitle">Click + to add your first todo</p>
    </div>

    <button id="addBtn" class="fab" title="New Todo (N)">+</button>
  </div>

  <!-- Pomodoro Modal -->
  <div id="pomodoroModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content pomodoro-content">
      <div class="modal-header">
        <h2>🍅 Pomodoro Timer</h2>
        <button class="icon-btn" onclick="closePomodoro()">✕</button>
      </div>
      <div class="modal-body" style="text-align:center;">
        <div class="pomo-ring">
          <svg viewBox="0 0 200 200">
            <circle class="pomo-bg" cx="100" cy="100" r="90"/>
            <circle id="pomoProgress" class="pomo-progress" cx="100" cy="100" r="90"/>
          </svg>
          <div class="pomo-time" id="pomoTime">25:00</div>
          <div class="pomo-label" id="pomoLabel">Focus Time</div>
        </div>
        <div class="pomo-sessions" id="pomoSessions"></div>
        <div class="pomo-controls">
          <button class="pomo-ctrl" onclick="pomoReset()" title="Reset">↺</button>
          <button id="pomoPlayBtn" class="pomo-play" onclick="pomoToggle()">▶</button>
          <button class="pomo-ctrl" onclick="pomoSkip()" title="Skip">⏭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">✨ New Todo</h2>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>Title *</label>
        <input type="text" id="todoTitle" placeholder="What needs to be done?" />

        <label>Description</label>
        <div class="rich-editor">
          <div class="rich-toolbar">
            <button class="rich-btn" onclick="richBold()" title="Bold"><b>B</b></button>
            <button class="rich-btn" onclick="richItalic()" title="Italic"><i>I</i></button>
            <button class="rich-btn" onclick="richUnderline()" title="Underline"><u>U</u></button>
            <button class="rich-btn" onclick="richList()" title="Bullet List">•≡</button>
          </div>
          <textarea id="todoDesc" placeholder="Add details..." rows="3"></textarea>
        </div>

        <div class="modal-row">
          <div>
            <label>Priority</label>
            <div class="priority-selector">
              <button class="priority-btn" data-priority="high">🔴 High</button>
              <button class="priority-btn active" data-priority="medium">🟠 Medium</button>
              <button class="priority-btn" data-priority="low">🟢 Low</button>
            </div>
          </div>
          <div>
            <label>Due Date</label>
            <input type="date" id="todoDueDate" />
            <div class="quick-dates">
              <button class="quick-date-btn" data-offset="0">Today</button>
              <button class="quick-date-btn" data-offset="1">Tomorrow</button>
              <button class="quick-date-btn" data-offset="7">Next week</button>
            </div>
            <button id="clearDate" class="text-btn">Clear date</button>
          </div>
        </div>

        <label>Tags</label>
        <div id="tagSelector" class="tag-selector"></div>

        <label>📋 Subtasks</label>
        <div id="subtaskSection" class="subtask-section">
          <div id="subtaskList" class="subtask-list"></div>
          <div class="subtask-add">
            <input type="text" id="subtaskInput" placeholder="Add a subtask..." onkeydown="if(event.key==='Enter')addSubtask()" />
            <button class="btn-primary" onclick="addSubtask()">+</button>
          </div>
        </div>

        <div class="modal-row">
          <div>
            <label>🔄 Recurring</label>
            <select id="todoRecurring">
              <option value="none">None</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div id="recurringIntervalWrap" class="hidden">
            <label>Every</label>
            <input type="number" id="recurringInterval" value="1" min="1" max="365" />
          </div>
        </div>

        <label>⏰ Reminder</label>
        <label class="switch">
          <input type="checkbox" id="todoReminder" />
          <span class="slider"></span>
          <span class="switch-label" id="reminderLabel">No reminder set</span>
        </label>
        <input type="datetime-local" id="todoReminderTime" class="hidden" />

        <label>📌 Pin to top</label>
        <label class="switch">
          <input type="checkbox" id="todoPinned" />
          <span class="slider"></span>
          <span class="switch-label">Keep this todo pinned at top</span>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="saveBtn">✨ Add Todo</button>
      </div>
    </div>
  </div>

  <!-- Tags Modal -->
  <div id="tagModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>🏷️ Manage Tags</h2>
        <button class="icon-btn" onclick="closeTagModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="cat-add-row">
          <input type="text" id="tagName" placeholder="Tag name" />
          <div id="tagColorPicker" class="color-picker"></div>
          <button class="btn-primary" id="addTagBtn">+</button>
        </div>
        <div id="tagList" class="cat-list"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
