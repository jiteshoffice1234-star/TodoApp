name: todo_app
description: A full-featured Todo app for Android
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  
  # Phase 2: Animations
  flutter_staggered_animations: ^1.1.1
  
  # Phase 3: Export/Import
  path_provider: ^2.1.0
  csv: ^5.1.0
  share_plus: ^7.2.0
  
  # Phase 4: Statistics Charts
  fl_chart: ^0.66.0
  
  # Phase 5: Voice Input
  speech_to_text: ^6.3.0
  
  # Phase 5: Attachments
  image_picker: ^1.0.0
  file_picker: ^6.1.0
  permission_handler: ^11.0.0
  
  # Phase 6: Home Screen Widget
  home_widget: ^0.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
